# .github/workflows/unzip-archive.yml
name: Unzip archive into repo root

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-and-push:
    runs-on: ubuntu-latest

    env:
      ARCHIVE_PATH: "Mmmmm.zip"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Show files in repo root
        run: |
          echo "Repository root files:"
          ls -la

      - name: Verify archive exists
        run: |
          if [ ! -f "$ARCHIVE_PATH" ]; then
            echo "File not found: $ARCHIVE_PATH"
            exit 1
          fi

      - name: Test archive
        run: |
          unzip -t "$ARCHIVE_PATH"

      - name: Extract archive to temp folder
        run: |
          mkdir -p temp_extract
          unzip -o "$ARCHIVE_PATH" -d temp_extract

      - name: Remove workflow files from extracted content
        run: |
          rm -rf temp_extract/.github/workflows

      - name: Move extracted content to repository root
        run: |
          shopt -s dotglob
          cp -R temp_extract/* .
          rm -rf temp_extract

      - name: Show files after extraction
        run: |
          echo "Files after moving extracted content to root:"
          ls -la

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Extract Mmmmm.zip into repository root"
          git push origin HEAD:main
